[package]
name = "rx-core"
version = "0.1.4"
authors = ["dayn9t <dayn9t@gmail.com>"]
edition = "2021"

build = "build.rs"

[build-dependencies]
vergen = { version = "*", features = ["build", "git", "cargo", "gitoxide"] }

[dependencies]

path_macro = "*"
rx-core-derive = { path = "../rx-core-derive" }

geo-types = "*"
itertools = "*"
anyhow = "*"
thiserror = "*"


serde = { version = "*", features = ["derive"] }
serde_json = "*"
serde_json5 = { package = "json5", version = "*" }
serde_ron = { package = "ron", version = "*" }
serde_yaml = "*"

encoding_rs = "*"

tracing = "*"
tracing-subscriber = "*"

uuid = { version = "*", features = ["serde", "v5"] }
chrono = { version = "*", features = ["serde"] }
time = "*"

dirs = "*"
num = "*"

rand_core = "*"
ring = "*"
linked-hash-map="*"
tempfile = "*"
